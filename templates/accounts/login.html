{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<section
    class="
        relative
        flex
        min-h-screen
        items-center
        justify-center
        overflow-hidden
        px-5
        py-24
        bg-[#FCFAFD]
    "
>

    <!-- RADIAL LIGHT -->

    <div
        class="
            absolute
            left-1/2
            top-1/2
            h-[500px]
            w-[500px]
            -translate-x-1/2
            -translate-y-1/2
            rounded-full
            bg-[#E93CAC]/15
            blur-3xl
        "
    ></div>

    <!-- CONTENT -->

    <div
        class="
            relative
            z-10
            w-full
            max-w-md
        "
    >

        <!-- LOGIN CARD -->

        <div
            class="
                fade-in
                relative
                overflow-hidden
                rounded-[32px]
                border
                border-[#4B2E83]/10
                bg-white
                p-6
                shadow-[0_30px_80px_rgba(233,60,172,0.12)]
                backdrop-blur-2xl
                md:p-8
            "
        >

            <!-- TOP LIGHT -->

            <div
                class="
                    pointer-events-none
                    absolute
                    inset-x-0
                    top-0
                    h-px
                    bg-gradient-to-r
                    from-transparent
                    via-[#E93CAC]/30
                    to-transparent
                "
            ></div>

            <!-- HEADER -->

            <div class="mb-8">

                <p
                    class="
                        mb-3
                        text-xs
                        uppercase
                        tracking-[0.25em]
                        text-[#6B5A8E]
                    "
                >

                    Bienvenido

                </p>

                <h1
                    class="
                        text-4xl
                        font-semibold
                        tracking-[-0.05em]
                        text-[#4B2E83]
                        md:text-5xl
                    "
                >

                    Ingresar

                </h1>

                <p
                    class="
                        mt-4
                        text-sm
                        leading-relaxed
                        text-[#6B5A8E]
                    "
                >

                    Accedé a tus cursos y continuá
                    aprendiendo desde tu plataforma.

                </p>

            </div>

            <!-- FORM -->

            <form
                method="POST"
                class="
                    space-y-5
                "
            >

                {% csrf_token %}

                <!-- USERNAME -->

                <div
                    class="
                        group
                        relative
                    "
                >

                    <input
                        type="text"
                        name="username"
                        placeholder="Usuario"
                        class="
                            h-14
                            w-full
                            rounded-2xl
                            border
                            border-[#4B2E83]/10
                            bg-[#FCFAFD]
                            px-5
                            text-[#4B2E83]
                            outline-none
                            backdrop-blur-xl
                            transition-all
                            duration-300
                            placeholder:text-[#6B5A8E]/60
                            focus:border-[#E93CAC]/30
                            focus:bg-white
                            focus:ring-4
                            focus:ring-[#E93CAC]/10
                        "
                    >

                </div>

                <!-- PASSWORD -->

                <div
                    class="
                        group
                        relative
                    "
                >

                    <input
                        type="password"
                        name="password"
                        placeholder="Contraseña"
                        class="
                            h-14
                            w-full
                            rounded-2xl
                            border
                            border-[#4B2E83]/10
                            bg-[#FCFAFD]
                            px-5
                            text-[#4B2E83]
                            outline-none
                            backdrop-blur-xl
                            transition-all
                            duration-300
                            placeholder:text-[#6B5A8E]/60
                            focus:border-[#E93CAC]/30
                            focus:bg-white
                            focus:ring-4
                            focus:ring-[#E93CAC]/10
                        "
                    >

                </div>

                <!-- BUTTON -->

                <button
                    class="
                        inline-flex
                        h-14
                        w-full
                        items-center
                        justify-center
                        rounded-2xl
                        bg-[#4B2E83]
                        text-sm
                        font-medium
                        text-white
                        transition-all
                        duration-500
                        ease-[cubic-bezier(.16,1,.3,1)]
                        hover:scale-[1.01]
                        hover:bg-[#E93CAC]
                        hover:shadow-[0_20px_60px_rgba(233,60,172,0.22)]
                        active:scale-[0.98]
                    "
                >

                    Ingresar

                </button>

            </form>

        </div>

    </div>

</section>

<style>

.fade-in {
    opacity: 0;
    transform: translateY(30px) scale(.98);
    animation: fadeIn 1s cubic-bezier(.16,1,.3,1) forwards;
}

@keyframes fadeIn {

    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}

</style>

{% endblock %}
